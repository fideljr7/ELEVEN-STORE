<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Login | ELEVEN.STORE</title>

    <link rel="stylesheet"
    href="css/style.css">

    <link rel="preconnect"
    href="https://fonts.googleapis.com">

    <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
    

</head>


<body class="login-page">

    <div class="login-container">

        <div class="login-card">

            <h1>ELEVEN.STORE</h1>

<p>
    Fragancias exclusivas para dejar huella.
</p>

<form action="/Eleven.Store/login" method="post">

    <input
    type="email"
    name="correo"
    placeholder="Correo electrónico"
    required>

    <input
    type="password"
    name="password"
    placeholder="Contraseña"
    required>

    <button type="submit">
        Ingresar
    </button>

</form>
      <span>

      ¿No tienes cuenta?
      <a href="register.html" class="mi-enlace">Regístrate aquí</a>
      </span>

        </div>

    </div>
    <script src="js/app.js"></script>
</body>



</html>
